# Locally: npm run release  (bumps version, changelog, commit, tag, push)
# CI publishes with provenance when:
# - A version tag is pushed (release-it uses v1.2.3), OR
# - You run this workflow manually from the Actions tab (workflow_dispatch).
#
# Pushing commits to main alone does NOT run this workflow.

name: Publish

on:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'
  workflow_dispatch:

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Release
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          fi
          npm run release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
